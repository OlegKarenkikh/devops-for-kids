version: "3.9"
services:
  web:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file: .env
    volumes:
      - collection-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  collection-data:
