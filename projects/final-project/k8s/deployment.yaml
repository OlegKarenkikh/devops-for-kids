apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-collection
  labels:
    app: collection
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collection
  template:
    metadata:
      labels:
        app: collection
    spec:
      containers:
      - name: web
        image: my-collection:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: APP_NAME
          value: "МояКоллекция-K8s"
        - name: APP_PORT
          value: "8080"
        - name: DB_PATH
          value: "/app/data/collection.db"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /items
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: data-volume
        emptyDir: {}
