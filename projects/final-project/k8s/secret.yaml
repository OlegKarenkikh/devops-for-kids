# Пример создания Secret из .env
# В реальном проекте — НЕ коммить реальные пароли!
# Используй: kubectl create secret generic collection-secret --from-env-file=.env

apiVersion: v1
kind: Secret
metadata:
  name: collection-secret
type: Opaque
stringData:
  APP_NAME: "МояКоллекция"
  APP_PORT: "8080"
  # DB_PATH: "/app/data/collection.db"  # путь не секрет, можно в ConfigMap
